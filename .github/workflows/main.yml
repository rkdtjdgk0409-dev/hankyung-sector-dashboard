name: 산업별 시장 대시보드 갱신 및 Pages 배포

on:
  workflow_dispatch:
  schedule:
    # UTC 07:05 = 한국시간 평일 16:05
    - cron: "5 7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sector-dashboard-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4

      - name: 필수 파일 확인
        run: |
          test -f index.html || (
            echo "index.html이 없습니다."
            exit 1
          )

          test -f styles.css || (
            echo "styles.css가 없습니다."
            exit 1
          )

          test -f app.js || (
            echo "app.js가 없습니다."
            exit 1
          )

          test -f requirements.txt || (
            echo "requirements.txt가 없습니다."
            exit 1
          )

          test -f update_data.py || (
            echo "루트의 update_data.py가 없습니다."
            exit 1
          )

          mkdir -p data

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: KRX 로그인 정보 확인
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          if [ -z "$KRX_ID" ] || [ -z "$KRX_PW" ]; then
            echo "KRX_ID 또는 KRX_PW GitHub Secret이 없습니다."
            exit 1
          fi

          echo "KRX 로그인 Secret 확인 완료"

      - name: 장 마감 데이터 생성
        env:
          TZ: Asia/Seoul
          MIN_MATCHED_STOCKS: "250"
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python update_data.py

      - name: 생성 결과 확인
        run: |
          test -f data/data.json || (
            echo "data/data.json이 생성되지 않았습니다."
            exit 1
          )

          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/data.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          meta = data.get("meta", {})
          matched = int(meta.get("matched_stocks", 0))
          kospi_count = int(meta.get("kospi200_target", 0))
          kosdaq_count = int(meta.get("kosdaq100_target", 0))
          industries = data.get("industries", [])

          print(f"KOSPI200 대상: {kospi_count}개")
          print(f"KOSDAQ100 대상: {kosdaq_count}개")
          print(f"매칭 종목: {matched}개")
          print(f"산업 수: {len(industries)}개")

          if kospi_count < 180:
              raise SystemExit(
                  f"KOSPI200 구성종목이 너무 적습니다: {kospi_count}개"
              )

          if kosdaq_count < 100:
              raise SystemExit(
                  f"KOSDAQ100 구성종목이 너무 적습니다: {kosdaq_count}개"
              )

          if matched < 250:
              raise SystemExit(
                  f"매칭 종목이 너무 적습니다: {matched}개"
              )

          if not industries:
              raise SystemExit("산업 데이터가 비어 있습니다.")
          PY

      - name: 진단 파일 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hankyung-diagnostics
          path: data/diagnostics.json
          if-no-files-found: ignore
          retention-days: 7

      - name: 변경된 데이터 저장
        run: |
          git add data/data.json

          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git config user.name "github-actions[bot]"
            git config user.email \
              "41898282+github-actions[bot]@users.noreply.github.com"

            git commit -m "chore: 장 마감 산업 데이터 갱신"
            git push
          fi

      - name: Pages 배포 폴더 준비
        run: |
          rm -rf _site
          mkdir -p _site/data

          cp index.html _site/index.html
          cp styles.css _site/styles.css
          cp app.js _site/app.js
          cp data/data.json _site/data/data.json

          touch _site/.nojekyll

          echo "배포할 파일:"
          find _site -maxdepth 3 -type f | sort

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: GitHub Pages 파일 업로드
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
