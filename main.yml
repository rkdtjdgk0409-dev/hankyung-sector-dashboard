name: 산업별 시장 대시보드 갱신

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron은 UTC 기준입니다.
    # 평일 07:05 UTC = 한국시간 16:05
    - cron: "5 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: sector-dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4

      - name: 필수 파일 확인
        run: |
          echo "저장소 파일 목록"
          find . -maxdepth 3 -type f | sort
          test -f requirements.txt || (echo "requirements.txt가 없습니다." && exit 1)
          test -f scripts/update_data.py || (echo "scripts/update_data.py가 없습니다." && exit 1)

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 장 마감 데이터 생성
        env:
          TZ: Asia/Seoul
          MIN_MATCHED_STOCKS: "250"
        run: python scripts/update_data.py

      - name: 변경 파일 커밋
        run: |
          git add data/data.json

          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: 장 마감 산업 데이터 갱신"
          git push
