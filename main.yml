name: 산업별 시장 대시보드 갱신 및 Pages 배포

on:
  workflow_dispatch:
  schedule:
    # UTC 07:05 = 한국시간 평일 16:05
    - cron: "5 7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sector-dashboard-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4

      - name: 필수 파일 확인
        run: |
          for file in index.html styles.css app.js requirements.txt update_data.py; do
            test -f "$file" || (
              echo "$file 파일이 없습니다."
              exit 1
            )
          done
          mkdir -p data

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: KRX 로그인 정보 확인
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          if [ -z "$KRX_ID" ] || [ -z "$KRX_PW" ]; then
            echo "KRX_ID 또는 KRX_PW GitHub Secret이 없습니다."
            exit 1
          fi
          echo "KRX 로그인 Secret 확인 완료"

      - name: 장 마감 데이터 생성
        env:
          TZ: Asia/Seoul
          MIN_MATCHED_STOCKS: "250"
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python update_data.py

      - name: 생성 결과 확인
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/data.json")
          if not path.exists():
              raise SystemExit("data/data.json이 생성되지 않았습니다.")

          data = json.loads(path.read_text(encoding="utf-8"))
          meta = data.get("meta", {})
          industries = data.get("industries", [])

          matched = int(meta.get("matched_stocks", 0))
          industry_count = len(industries)
          largest = max(
              (len(item.get("stocks", [])) for item in industries),
              default=0,
          )

          print(f"매칭 종목: {matched}개")
          print(f"산업 수: {industry_count}개")
          print(f"가장 큰 산업: {largest}개 기업")

          if matched < 250:
              raise SystemExit(f"매칭 종목이 너무 적습니다: {matched}개")
          if industry_count < 10:
              raise SystemExit(f"산업 수가 너무 적습니다: {industry_count}개")
          if largest > 55:
              raise SystemExit(
                  f"한 산업에 종목이 너무 많이 몰렸습니다: {largest}개"
              )
          PY

      - name: 진단 파일 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hankyung-sector-diagnostics
          path: data/diagnostics.json
          if-no-files-found: ignore
          retention-days: 7

      - name: 변경된 데이터 저장
        run: |
          git add data/data.json data/diagnostics.json

          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git config user.name "github-actions[bot]"
            git config user.email \
              "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "fix: 산업별 장 마감 데이터 갱신"
            git push
          fi

      - name: Pages 배포 폴더 준비
        run: |
          rm -rf _site
          mkdir -p _site/data
          cp index.html styles.css app.js _site/
          cp data/data.json _site/data/
          touch _site/.nojekyll
          find _site -maxdepth 3 -type f | sort

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: GitHub Pages 파일 업로드
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
